<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      header {
        display: flex;
        justify-content: space-between;
      }
      .brand-title {
        font-size: 25px;
        font-weight: bold;
      }
      .brand-menu {
        font-size: 23px;
      }
      .brand-menu span {
        margin-right: 20px;
      }
      .brand-icons {
        font-size: 25px;
      }
      .brand-icons span {
        margin-right: 20px;
      }
      .brand-offer {
        background-color: black;
        color: white;
        text-align: center;
        padding: 12px;
        font-weight: bold;
      }
      .women {
        background-image: url(wome2.jpg);
      }
      .men {
        background-image: url(men1.jpg);
        margin-left: 10px;
      }
      .kids {
        background-image: url(kids.jpg);
        margin-left: 10px;
      }
      .brand-nav {
        display: grid;
        grid-template-columns: 4fr 4fr 4fr;
        height: 450px;
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        margin-top: 10px;
      }
    </style>
  </head>
  <body class="container-fluid">
    <header>
      <div class="brand-title">Shoper .</div>
      <div class="brand-menu">
        <span>Home</span>
        <span>Catalog</span>
        <span>Shop</span>
        <span>Pages</span>
        <span>Blog</span>
        <span>Docs</span>
      </div>
      <div class="brand-icons">
        <span class="bi bi-search"></span>
        <span class="bi bi-person"></span>
        <span class="bi bi-heart"></span>
        <span class="bi bi-cart"></span>
      </div>
    </header>
    <div class="brand-offer">
      <span class="bi bi-lightning-fill text-warning"></span> Happy Holiday
      Deals On Everyting
      <span class="bi bi-lightning-fill text-warning"></span>
    </div>
    <div class="brand-nav">
      <div class="women">
        <div class="brand-head">Women</div>
        <button>Shop Women <span class="bi bi-arrow-right"></span></button>
      </div>
      <div class="men">
        <div class="brand-title1">
          Men

          <div>
            <button>Shop Men <span class="bi bi-arrow-right"></span></button>
          </div>
        </div>
      </div>
      <div class="kids">
        <div class="brand-head">Shop Kids</div>
        <div>
          <button>Shop Kids <span class="bi bi-arrow-right"></span></button>
        </div>
      </div>
    </div>
  </body>
</html>
