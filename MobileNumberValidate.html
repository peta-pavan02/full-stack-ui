<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      function VeryfyName() {
        var username = document.getElementById("userName").value;
        var buttion = document.querySelector("button");
        if ((username = "")) {
          buttion.disabled = true;
        } else {
          buttion.disabled = false;
        }
      }
    </script>
  </head>
  <body>
    <dl>
      <dt>User Name</dt>
      <dd>
        <input
          type="text"
          onkeyup="VeryfyName()"
          placeholder="User Name Is Required"
          id="userName"
        />
      </dd>
    </dl>
    <button disabled>Register</button>
  </body>
</html>
