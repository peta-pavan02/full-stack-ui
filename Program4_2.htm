<!doctype html>
<html>
  <head>
    <title>Div with Marquee</title>
  </head>
  <body>
    <article>
      <div><marquee direction="left">50% On The Sale</marquee></div>
      <div>
        <marquee
          direction="right"
          onmouseover="this.stop()"
          onmouseout="this.start()"
        >
          This marquee text is inside a div tag
        </marquee>
      </div>
    </article>
  </body>
</html>
