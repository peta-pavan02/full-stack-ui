<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <style>
      form {
        display: grid;
        grid-template-columns: 3fr 9fr;
      }
      meter {
        width: 200px;
      }
      ul {
        list-style: none;
      }
      .rate {
        font-size: 50px;
      }
      .review {
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <form>
      <div>
        <div class="rate">
          4.4
          <span class="bi bi-star-fill"></span>
        </div>
        <div class="review">
          6,901 Rating& <br />
          556 Reviews
        </div>
      </div>
      <div>
        <ul>
          <li>
            5 <span class="bi bi-star-fill"></span>
            <meter min="1" max="5" value="5"></meter> 4552
          </li>
          <li>
            4 <span class="bi bi-star-fill"></span>
            <meter min="1" max="5" value="3"></meter> 1475
          </li>
          <li>
            3 <span class="bi bi-star-fill"></span>
            <meter min="1" max="8" value="4"></meter> 359
          </li>
          <li>
            2 <span class="bi bi-star-fill"></span>
            <meter min="1" max="8" value="5"></meter> 165
          </li>
          <li>
            1 <span class="bi bi-star-fill"></span>
            <meter min="1" max="5" value="5"></meter> 350
          </li>
        </ul>
      </div>
    </form>
  </body>
</html>
