<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Registration</h2>
    <form>
      Gmail:
      <input type="text" name="gmail" readonly value="@gmail.com" /><br />
      OTP:
      <input
        type="text"
        name="otp"
        minlength="4"
        maxlength="6"
        placeholder="Enter Your OTP"
        autofocus
      />
      <button>Registration</button>
    </form>
  </body>
</html>
