<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.css" />
    <script>
        function AmountChange(){
            document.getElementById("textAmount").value=document.getElementById("RangeAmount").value;

        }
        function RateChange(){
            document.getElementById("textYear").value=document.getElementById("RangeYear").value;

        }
    </script>
  </head>
  <body class="container-fluid">
    <h2>EMI Calucator</h2>
    <div class="border border-2 border-dark p-3">
      <div class="row">
        <div class="col">Amount You need &#8377; <input id="textAmount" "text" /></div>
        <div class="col">For <input type="text" size="2"  id="textYear"/> Years</div>
        <div class="col">Intrest rate <input type="text" />%</div>
      </div>
      <div class="row">
        <div class="col">&#8377; 50000 <input type="range" onchange="AmountChange()" id="RangeAmount" min="50000" max="100000" /> &#8377 1000000</div>
        <div class="col"> 1 Year <input type="range" max="5" min="1" onchange="RateChange()" id="RangeYear"> 5 Years</div>
        <div class="col"> 15.0% <input type="range" id="RangeIntrest" onchange="IntrestChange" max> 25.0%</div>
      </div>
      <div class="row mt-3">
        <div class="col text-center">
          <button class="btn btn-primary">Calculate</button>
        </div>
      </div>
    </div>
  </body>
</html>
