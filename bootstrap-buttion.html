<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.css" />

  <body class="container-fluid mb-30">

    <button class="btn-close"></button>

        <button class="btn btn-danger">About</button>
